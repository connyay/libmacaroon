name: build_and_test

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --locked
      - run: cargo test --no-default-features --locked

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.71
      - uses: Swatinem/rust-cache@v2
      # MSRV covers the library build; `cargo test` pulls in dev-dep
      # transitives that require newer editions and is not part of the
      # MSRV contract.
      - run: cargo build --all-features --locked

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown --features wasm --locked
      - run: cargo build --target wasm32-unknown-unknown --features wasm --example wasm_example --locked

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Scope the cache to the audit job so it doesn't collide with
      # test/clippy caches. Caches the cargo-audit binary + advisory DB
      # + registry index — scan results are never cached, so no
      # staleness risk for new advisories.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit
          cache-directories: |
            ~/.cargo/advisory-db
      # Installs a pre-built cargo-audit binary (few seconds) instead of
      # compiling from source (~2 min like `rustsec/audit-check` does).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  # Publishes to crates.io when a `v*.*.*` tag is pushed. Gated on every
  # other job passing so a green tag build is required to ship.
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fmt, clippy, test, msrv, wasm, audit]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $VERSION"
            exit 1
          fi
      # Dry run first — surfaces packaging errors (missing files,
      # dirty-tree warnings that actually are errors on publish) before
      # the real publish, without cluttering the crates.io history.
      - run: cargo publish --locked --dry-run
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Creates a GitHub Release for the tag. No release notes are
      # generated — fill in from ChangeLog.md manually, or drop the `-F`
      # flag if you want an empty body you can edit in the UI.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See [ChangeLog.md](https://github.com/${{ github.repository }}/blob/main/ChangeLog.md) for release notes."
